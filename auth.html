<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logg inn — Børshjelpen</title>
<link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #f8f7f4; min-height: 100vh; display: flex; flex-direction: column; }
nav { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: white; border-bottom: 1px solid #e8e8e8; }
.logo { font-family: 'Tenor Sans', sans-serif; font-size: 18px; letter-spacing: 2.5px; text-transform: uppercase; text-decoration: none; color: #1a1a1a; }
.logo span { color: #C8A96E; }
.main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.card { background: white; border-radius: 16px; border: 1px solid #e8e8e8; width: 100%; max-width: 400px; overflow: hidden; }
.card-header { background: #1B3A5C; padding: 2rem; text-align: center; }
.card-logo { font-family: 'Tenor Sans', sans-serif; font-size: 20px; letter-spacing: 2.5px; text-transform: uppercase; color: white; }
.card-logo span { color: #C8A96E; }
.card-sub { font-size: 13px; color: rgba(255,255,255,.55); margin-top: 6px; }
.card-body { padding: 2rem; }
.tabs { display: flex; border-bottom: 1px solid #e8e8e8; margin-bottom: 1.5rem; }
.tab { flex: 1; padding: 10px; font-size: 14px; background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.active { color: #1B3A5C; border-bottom-color: #1B3A5C; font-weight: 500; }
.field { margin-bottom: 1.1rem; }
.field label { display: block; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 5px; }
.field input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #e8e8e8; font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color .15s; }
.field input:focus { border-color: #1B3A5C; }
.btn-main { width: 100%; padding: 11px; border-radius: 100px; border: none; background: #1B3A5C; color: white; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background .15s; }
.btn-main:hover { background: #2a5070; }
.btn-main:disabled { background: #ccc; cursor: not-allowed; }
.divider { display: flex; align-items: center; gap: 10px; margin: 1.2rem 0; font-size: 12px; color: #aaa; }
.divider-line { flex: 1; height: 1px; background: #e8e8e8; }
.btn-google { width: 100%; padding: 10px; border-radius: 100px; border: 1px solid #e8e8e8; background: white; font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; display: flex; align-items: center; justify-content: center; gap: 10px; transition: border-color .15s; }
.btn-google:hover { border-color: #1B3A5C; }
.footer-note { font-size: 12px; color: #aaa; text-align: center; margin-top: 1.2rem; }
.footer-note span { color: #1B3A5C; cursor: pointer; }
.msg { font-size: 13px; padding: 10px 12px; border-radius: 8px; margin-bottom: 1rem; display: none; }
.msg.error { background: #FCEBEB; color: #A32D2D; }
.msg.success { background: #E1F5EE; color: #0F6E56; }
.forgot-link { font-size: 12px; color: #1B3A5C; cursor: pointer; text-align: right; margin-top: -6px; margin-bottom: 1rem; display: block; }
.forgot-link:hover { text-decoration: underline; }
</style>
</head>
<body>

<nav>
  <a href="/borshjelpen.html" class="logo">Børs<span>hjelpen</span></a>
</nav>

<div class="main">
  <div class="card">
    <div class="card-header">
      <div class="card-logo">Børs<span>hjelpen</span></div>
      <div class="card-sub">Forstå børsen. Endelig.</div>
    </div>
    <div class="card-body">
      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">Logg inn</button>
        <button class="tab" id="tab-signup" onclick="switchTab('signup')">Registrer deg</button>
      </div>

      <div id="msg" class="msg"></div>

      <!-- LOGG INN -->
      <div id="form-login">
        <div class="field"><label>E-post</label><input type="email" id="login-email" placeholder="din@epost.no" /></div>
        <div class="field">
          <label>Passord</label>
          <input type="password" id="login-pass" placeholder="••••••••" />
        </div>
        <span class="forgot-link" onclick="showForgotForm()">Glemt passord?</span>
        <button class="btn-main" id="btn-login" onclick="doLogin()">Logg inn</button>
        <div class="divider"><div class="divider-line"></div>eller<div class="divider-line"></div></div>
        <button class="btn-google" onclick="doGoogle()">
          <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Fortsett med Google
        </button>
        <div class="footer-note">Ikke bruker? <span onclick="switchTab('signup')">Registrer deg gratis</span></div>
      </div>

      <!-- GLEMT PASSORD -->
      <div id="form-forgot" style="display:none">
        <p style="font-size:14px;color:#666;margin-bottom:1.25rem;line-height:1.6;">Skriv inn e-posten din så sender vi en lenke for å tilbakestille passordet.</p>
        <div class="field"><label>E-post</label><input type="email" id="forgot-email" placeholder="din@epost.no" /></div>
        <button class="btn-main" id="btn-forgot" onclick="doForgot()">Send tilbakestillingslenke</button>
        <div class="footer-note" style="margin-top:1rem;"><span onclick="switchTab('login')">← Tilbake til innlogging</span></div>
      </div>

      <!-- REGISTRER -->
      <div id="form-signup" style="display:none">
        <div class="field"><label>Navn</label><input type="text" id="signup-name" placeholder="Ditt fulle navn" /></div>
        <div class="field"><label>E-post</label><input type="email" id="signup-email" placeholder="din@epost.no" /></div>
        <div class="field"><label>Passord</label><input type="password" id="signup-pass" placeholder="Minst 8 tegn" /></div>
        <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:1rem;">
          <input type="checkbox" id="terms-check" style="margin-top:3px;width:16px;height:16px;flex-shrink:0;cursor:pointer;accent-color:#1B3A5C;" />
          <label for="terms-check" style="font-size:13px;color:#666;line-height:1.5;cursor:pointer;">
            Jeg har lest og godtar <a href="/vilkar.html" target="_blank" style="color:#1B3A5C;">vilkårene for bruk</a> og <a href="/personvern.html" target="_blank" style="color:#1B3A5C;">personvernerklæringen</a>
          </label>
        </div>
        <button class="btn-main" id="btn-signup" onclick="doSignup()">Opprett konto</button>
        <div class="divider"><div class="divider-line"></div>eller<div class="divider-line"></div></div>
        <button class="btn-google" onclick="doGoogle()">
          <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
          Fortsett med Google
        </button>
        <div class="footer-note">Har du konto? <span onclick="switchTab('login')">Logg inn</span></div>
      </div>

    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://twckvtwzyadevqbyehnu.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3Y2t2dHd6eWFkZXZxYnllaG51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5NTYwNTIsImV4cCI6MjA5NTUzMjA1Mn0.rDXcB_E-UcttfvEcJBTUGl-ZDyclHHlXnKnp5lOZI4c';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
  document.getElementById('form-forgot').style.display = 'none';
  showMsg('', '');
}

function showForgotForm() {
  document.getElementById('form-login').style.display = 'none';
  document.getElementById('form-forgot').style.display = 'block';
  showMsg('', '');
  var email = document.getElementById('login-email').value;
  if (email) document.getElementById('forgot-email').value = email;
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg' + (type ? ' ' + type : '');
  el.style.display = text ? 'block' : 'none';
}

function setLoading(btnId, loading, label) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.textContent = loading ? 'Laster...' : label;
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!email || !pass) { showMsg('Fyll inn e-post og passord.', 'error'); return; }
  setLoading('btn-login', true, 'Logg inn');
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  setLoading('btn-login', false, 'Logg inn');
  if (error) { showMsg(error.message, 'error'); return; }
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      // Kun 1 login-XP per dag
      var loginToday = new Date().toISOString().slice(0, 10);
      var { data: loginCheck } = await sb.from('user_activity').select('id').eq('user_id', session.user.id).eq('type', 'login').gte('created_at', loginToday + 'T00:00:00Z').limit(1);
      if (!loginCheck || loginCheck.length === 0) {
        await sb.from('user_activity').insert({ user_id: session.user.id, type: 'login', ticker: null, name: 'Daglig innlogging', xp: 3 });
        try { var apd = await sb.from('user_plans').select('total_xp').eq('user_id', session.user.id).maybeSingle(); var axp = (apd.data && apd.data.total_xp) || 0; await sb.from('user_plans').upsert({ user_id: session.user.id, total_xp: axp + 3 }, { onConflict: 'user_id' }); } catch(e) {}
      }
    }
  } catch(e) {}
  window.location.href = '/borshjelpen.html';
}

async function doForgot() {
  const email = document.getElementById('forgot-email').value.trim();
  if (!email) { showMsg('Skriv inn e-postadressen din.', 'error'); return; }
  setLoading('btn-forgot', true, 'Send tilbakestillingslenke');

  // Sjekk om e-posten finnes ved å prøve å logge inn med feil passord
  // Supabase gir ulik feil om brukeren ikke finnes vs. feil passord
  const { error: checkError } = await sb.auth.signInWithPassword({ email, password: '___CHECK_ONLY___' });
  
  if (checkError && checkError.message.includes('Invalid login credentials')) {
    // Feil passord = brukeren finnes — send reset-lenke
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://borshjelpen.vercel.app/auth.html?type=recovery'
    });
    setLoading('btn-forgot', false, 'Send tilbakestillingslenke');
    if (error) { showMsg(error.message, 'error'); return; }
    showMsg('Vi har sendt en lenke til ' + email + '. Sjekk innboksen din.', 'success');
  } else if (checkError && (checkError.message.includes('Email not confirmed') || checkError.message.includes('email'))) {
    // E-post ikke bekreftet — send reset-lenke likevel
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: 'https://borshjelpen.vercel.app/auth.html?type=recovery'
    });
    setLoading('btn-forgot', false, 'Send tilbakestillingslenke');
    if (error) { showMsg(error.message, 'error'); return; }
    showMsg('Vi har sendt en lenke til ' + email + '. Sjekk innboksen din.', 'success');
  } else {
    // Brukeren finnes ikke
    setLoading('btn-forgot', false, 'Send tilbakestillingslenke');
    showMsg('Vi finner ingen konto med denne e-postadressen. Er du sikker på at du har registrert deg?', 'error');
  }
}

async function doSignup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass = document.getElementById('signup-pass').value;
  const termsChecked = document.getElementById('terms-check').checked;
  if (!termsChecked) {
    showMsg('Du må godta vilkårene og personvernerklæringen for å opprette konto.', 'error');
    document.getElementById('terms-check').style.outline = '2px solid #A32D2D';
    setTimeout(function() { document.getElementById('terms-check').style.outline = 'none'; }, 2000);
    return;
  }
  if (!name || !email || !pass) { showMsg('Fyll inn alle feltene.', 'error'); return; }
  if (pass.length < 8) { showMsg('Passordet må være minst 8 tegn.', 'error'); return; }
  setLoading('btn-signup', true, 'Opprett konto');
  const { error } = await sb.auth.signUp({
    email, password: pass,
    options: { data: { full_name: name }, emailRedirectTo: 'https://borshjelpen.vercel.app/auth.html' }
  });
  setLoading('btn-signup', false, 'Opprett konto');
  if (error) { showMsg(error.message, 'error'); return; }
  showMsg('Konto opprettet! Sjekk e-posten din for bekreftelse.', 'success');
}

async function doGoogle() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/profil.html' }
  });
}

sb.auth.onAuthStateChange(async (event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    // Vis skjema for nytt passord
    document.getElementById('form-login').style.display = 'none';
    document.getElementById('form-forgot').style.display = 'none';
    document.getElementById('form-signup').style.display = 'none';
    document.getElementById('tab-login').style.display = 'none';
    document.getElementById('tab-signup').style.display = 'none';
    document.querySelector('.card-body').insertAdjacentHTML('afterbegin', `
      <div id="form-reset">
        <p style="font-size:14px;color:#666;margin-bottom:1.25rem;line-height:1.6;">Skriv inn ditt nye passord.</p>
        <div id="msg-reset" class="msg" style="display:none;"></div>
        <div class="field"><label>Nytt passord</label><input type="password" id="new-pass" placeholder="Minst 8 tegn" /></div>
        <div class="field"><label>Gjenta passord</label><input type="password" id="new-pass2" placeholder="Minst 8 tegn" /></div>
        <button class="btn-main" id="btn-reset" onclick="doResetPassword()">Lagre nytt passord</button>
      </div>
    `);
    return;
  }
  if (event === 'SIGNED_IN' && session) {
    if (!window.location.search.includes('type=recovery')) {
      window.location.href = '/borshjelpen.html';
    }
  }
});

async function doResetPassword() {
  const pass = document.getElementById('new-pass').value;
  const pass2 = document.getElementById('new-pass2').value;
  const msgEl = document.getElementById('msg-reset');
  if (pass.length < 8) { msgEl.textContent = 'Passordet må være minst 8 tegn.'; msgEl.className = 'msg error'; msgEl.style.display = 'block'; return; }
  if (pass !== pass2) { msgEl.textContent = 'Passordene er ikke like.'; msgEl.className = 'msg error'; msgEl.style.display = 'block'; return; }
  const btn = document.getElementById('btn-reset');
  btn.disabled = true; btn.textContent = 'Lagrer...';
  const { error } = await sb.auth.updateUser({ password: pass });
  if (error) {
    msgEl.textContent = error.message; msgEl.className = 'msg error'; msgEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Lagre nytt passord';
    return;
  }
  msgEl.textContent = 'Passordet er oppdatert! Du logges inn...'; msgEl.className = 'msg success'; msgEl.style.display = 'block';
  setTimeout(function() { window.location.href = '/borshjelpen.html'; }, 1500);
}

(async function handleEmailConfirmation() {
  const params = new URLSearchParams(window.location.search);
  const hashParams = new URLSearchParams(window.location.hash.replace('#', ''));
  const token_hash = params.get('token_hash') || hashParams.get('token_hash');
  const type = params.get('type') || hashParams.get('type');
  const access_token = hashParams.get('access_token');
  const refresh_token = hashParams.get('refresh_token');
  if (token_hash && type) {
    const { error } = await sb.auth.verifyOtp({ token_hash, type });
    if (!error && type !== 'recovery') window.location.href = '/borshjelpen.html';
  } else if (access_token) {
    await sb.auth.setSession({ access_token, refresh_token });
    if (type !== 'recovery') window.location.href = '/borshjelpen.html';
  }
})();
</script>
</body>
</html>
